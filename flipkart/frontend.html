<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology UI</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="frontend.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Technologies</h3>

        <ul>
            <li class="active"><i class="fa-solid fa-desktop"></i>Frontend</li>
            <li><i class="fa-solid fa-server"></i>Backend</li>
            <li><i class="fa-solid fa-mobile-screen-button"></i>Mobile</li>
            <li><i class="fa-solid fa-layer-group"></i>Platforms</li>
            <li><i class="fa-solid fa-database"></i>Databases</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="content">

        <div class="title">
            <div class="icon">
                <i class="fa-solid fa-desktop"></i>
            </div>
            <h2>Frontend</h2>
        </div>

        <div class="cards">

            <div class="card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/angularjs/angularjs-original.svg">
                <p>AngularJS</p>
            </div>

            <div class="card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg">
                <p>ReactJS</p>
            </div>

            <div class="card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg">
                <p>Vue.js</p>
            </div>

            <div class="card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg">
                <p>JavaScript</p>
            </div>

            <div class="card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg">
                <p>CSS3</p>
            </div>

            <div class="card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg">
                <p>HTML5</p>
            </div>

            <div class="card">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg">
                <p>Next.js</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
