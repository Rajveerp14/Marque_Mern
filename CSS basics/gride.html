<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    <link rel="stylesheet" href="gride.css">
</head>
<body>

<h1>♔ Chess Board ♚</h1>

<div id="grid-container">

    <!-- Row 1 -->
    <div class="grid-items white">♜</div>
    <div class="grid-items black">♞</div>
    <div class="grid-items white">♚</div>
    <div class="grid-items black">♝</div>
    <div class="grid-items white">♜</div>

    <!-- Row 2 -->
    <div class="grid-items black">♟</div>
    <div class="grid-items white">♟</div>
    <div class="grid-items black">♟</div>
    <div class="grid-items white">♟</div>
    <div class="grid-items black">♟</div>

    <!-- Row 3 -->
    <div class="grid-items white"></div>
    <div class="grid-items black">⚔️</div>
    <div class="grid-items white">♛</div>
    <div class="grid-items black">⚔️</div>
    <div class="grid-items white"></div>

    <!-- Row 4 -->
    <div class="grid-items black">♙</div>
    <div class="grid-items white">♙</div>
    <div class="grid-items black">♙</div>
    <div class="grid-items white">♙</div>
    <div class="grid-items black">♙</div>

    <!-- Row 5 -->
    <div class="grid-items white">♖</div>
    <div class="grid-items black">♘</div>
    <div class="grid-items white">♔</div>
    <div class="grid-items black">♗</div>
    <div class="grid-items white">♖</div>

</div>

</body>
</html>
